<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lost & Found — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background:
        linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
    }

    .login-header {
      margin-bottom: 2.5rem;
    }

    .login-logo {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--mono);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .login-logo::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    .login-header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .login-header h1 span {
      color: var(--accent);
    }

    .login-header p {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .tab-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .tab-strip button {
      padding: 0.9rem;
      background: transparent;
      border: none;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab-strip button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: rgba(200,241,53,0.04);
    }

    .tab-strip button:hover:not(.active) {
      color: var(--text);
      background: rgba(255,255,255,0.02);
    }

    .login-body {
      padding: 2rem;
    }

    .login-body .form-card {
      background: transparent;
      border: none;
      padding: 0;
      max-width: 100%;
    }

    .login-footer {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .footer-tag {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-box">

    <div class="login-header">
      <div class="login-logo">L&amp;F System</div>
      <h1>Lost &amp; <span>Found.</span></h1>
      <p>Campus item management — sign in to continue.</p>
    </div>

    <div class="login-card">

      <div class="tab-strip">
        <button class="active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div class="login-body">
        <div id="alert" class="alert"></div>

        <!-- LOGIN FORM -->
        <div id="form-login">
          <div class="form-card">
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="login-email" placeholder="you@campus.edu"/>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="login-password" placeholder="••••••••"/>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:0.4rem;" onclick="doLogin()">
              Sign In →
            </button>
          </div>
        </div>

        <!-- REGISTER FORM -->
        <div id="form-register" style="display:none;">
          <div class="form-card">
            <div class="form-group">
              <label>Full Name *</label>
              <input type="text" id="reg-name" placeholder="Your full name"/>
            </div>
            <div class="form-group">
              <label>Email *</label>
              <input type="email" id="reg-email" placeholder="you@campus.edu"/>
            </div>
            <div class="form-group">
              <label>Password *</label>
              <input type="password" id="reg-password" placeholder="Min. 6 characters"/>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
              <div class="form-group" style="margin-bottom:0;">
                <label>Phone</label>
                <input type="text" id="reg-phone" placeholder="Optional"/>
              </div>
              <div class="form-group" style="margin-bottom:0;">
                <label>Role</label>
                <select id="reg-role">
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary" style="width:100%; margin-top:1.2rem;" onclick="doRegister()">
              Create Account →
            </button>
          </div>
        </div>

        <div class="login-footer">
          <span class="footer-tag">Report Lost</span>
          <span class="footer-tag">Report Found</span>
          <span class="footer-tag">Manage Claims</span>
          <span class="footer-tag">DBMS Project</span>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000'

  function switchTab(tab) {
    const isLogin = tab === 'login'
    document.getElementById('form-login').style.display    = isLogin ? 'block' : 'none'
    document.getElementById('form-register').style.display = isLogin ? 'none'  : 'block'
    document.getElementById('tab-login').classList.toggle('active', isLogin)
    document.getElementById('tab-register').classList.toggle('active', !isLogin)
    document.getElementById('alert').style.display = 'none'
  }

  function showAlert(message, type) {
    const el = document.getElementById('alert')
    el.textContent   = message
    el.className     = `alert alert-${type}`
    el.style.display = 'block'
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value
    if (!email || !password) { showAlert('Please enter your email and password.', 'error'); return }
    try {
      const res  = await fetch(API + '/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password })
      })
      const data = await res.json()
      if (!res.ok) { showAlert(data.error, 'error'); return }
      sessionStorage.setItem('user_id',   data.user_id)
      sessionStorage.setItem('user_name', data.name)
      sessionStorage.setItem('user_role', data.role)
      window.location.href = 'index.html'
    } catch (e) {
      showAlert('Could not connect to server. Is it running?', 'error')
    }
  }

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim()
    const email    = document.getElementById('reg-email').value.trim()
    const password = document.getElementById('reg-password').value
    const phone    = document.getElementById('reg-phone').value.trim()
    const role     = document.getElementById('reg-role').value
    if (!name || !email || !password) { showAlert('Name, email and password are required.', 'error'); return }
    try {
      const res  = await fetch(API + '/register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, email, password, phone, role })
      })
      const data = await res.json()
      if (!res.ok) { showAlert(data.error, 'error'); return }
      showAlert('Account created! You can now sign in.', 'success')
      switchTab('login')
    } catch (e) {
      showAlert('Could not connect to server. Is it running?', 'error')
    }
  }

  if (sessionStorage.getItem('user_id')) window.location.href = 'index.html'

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return
    document.getElementById('form-login').style.display !== 'none' ? doLogin() : doRegister()
  })
</script>
</body>
</html>
