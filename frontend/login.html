<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lost & Found — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }

    h2 {
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      color: #222;
    }

    .tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #ddd;
    }

    .tab {
      flex: 1;
      padding: 0.6rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: #222;
      border-bottom: 2px solid #222;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.3rem;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      outline: none;
    }

    input:focus { border-color: #555; }

    select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      outline: none;
      background: white;
    }

    button.submit {
      width: 100%;
      padding: 0.7rem;
      background: #222;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    button.submit:hover { background: #444; }

    .message {
      font-size: 0.85rem;
      padding: 0.6rem 0.8rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      display: none;
    }

    .message.error   { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
    .message.success { background: #eafaf1; color: #1e8449; border: 1px solid #c3e6cb; }
  </style>
</head>
<body>

<div class="container">
  <h2>Lost & Found System</h2>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Login</button>
    <button class="tab" onclick="showTab('signup')">Sign Up</button>
  </div>

  <!-- Message -->
  <div class="message" id="msg"></div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="Enter your name"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="login-role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="submit" onclick="login()">Login</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signup-form" style="display:none">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="signup-username" placeholder="Enter your name"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="Enter your email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Create a password"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="signup-role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="submit" onclick="signup()">Sign Up</button>
  </div>
</div>

<script>
  const API = 'http://localhost:3000'

  function showTab(tab) {
    document.getElementById('login-form').style.display  = tab === 'login'  ? 'block' : 'none'
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none'
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1))
    })
    hideMsg()
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg')
    el.textContent = text
    el.className = 'message ' + type
    el.style.display = 'block'
  }

  function hideMsg() {
    document.getElementById('msg').style.display = 'none'
  }

  async function login() {
    const username = document.getElementById('login-username').value.trim()
    const password = document.getElementById('login-password').value.trim()
    const role     = document.getElementById('login-role').value

    if (!username || !password) { showMsg('Please fill in all fields.', 'error'); return }

    try {
      const res   = await fetch(API + '/users')
      const users = await res.json()

      const match = users.find(u =>
        u.name.toLowerCase() === username.toLowerCase() && u.role === role
      )

      if (!match) {
        showMsg('User not found. Please sign up first.', 'error')
        return
      }

      // Simple password check (stored as plain text in db)
      if (match.password && match.password !== password) {
        showMsg('Incorrect password.', 'error')
        return
      }

      localStorage.setItem('laf_user', JSON.stringify({
        user_id: match.user_id,
        name:    match.name,
        role:    match.role
      }))

      showMsg('Login successful! Redirecting...', 'success')
      setTimeout(() => { window.location.href = 'index.html' }, 1000)

    } catch (e) {
      showMsg('Cannot connect to backend. Make sure server.js is running.', 'error')
    }
  }

  async function signup() {
    const username = document.getElementById('signup-username').value.trim()
    const email    = document.getElementById('signup-email').value.trim()
    const password = document.getElementById('signup-password').value.trim()
    const role     = document.getElementById('signup-role').value

    if (!username || !email || !password) { showMsg('Please fill in all fields.', 'error'); return }

    try {
      const res  = await fetch(API + '/users', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name: username, email, phone: '', role })
      })
      const data = await res.json()

      if (data.user_id) {
        showMsg('Account created! You can now log in.', 'success')
        setTimeout(() => { showTab('login') }, 1500)
      } else {
        showMsg('Sign up failed. Try again.', 'error')
      }
    } catch (e) {
      showMsg('Cannot connect to backend. Make sure server.js is running.', 'error')
    }
  }

  // Redirect if already logged in
  if (localStorage.getItem('laf_user')) {
    window.location.href = 'index.html'
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activeTab = document.getElementById('login-form').style.display !== 'none'
      if (activeTab) login(); else signup()
    }
  })
</script>
</body>
</html>
